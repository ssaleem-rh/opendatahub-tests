ci:
    autofix_prs: true
    autoupdate_schedule: weekly
    autoupdate_commit_msg: "chore: update pre-commit hooks"

minimum_pre_commit_version: 3.3.0
default_install_hook_types: [pre-commit, commit-msg]

default_language_version:
  python: python3.14

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: "v6.0.0"
    hooks:
      - id: check-merge-conflict
      - id: debug-statements
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md] # Do not process Markdown files.
      - id: end-of-file-fixer
      - id: check-ast
      - id: check-builtin-literals
      - id: check-docstring-first
      - id: check-toml

  - repo: https://github.com/PyCQA/flake8
    rev: "7.3.0"
    hooks:
      - id: flake8
        args: [--config=.flake8]
        additional_dependencies:
          [
            "git+https://github.com/RedHatQE/flake8-plugins.git@v0.0.6",
            "flake8-mutable",
          ]

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: .*/__snapshots__/.*|.*-input\.json$|^semgrep\.yaml$

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff
      - id: ruff-format

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.20.1
    hooks:
      - id: mypy
        additional_dependencies: ["types-PyYAML", "types-requests"]
        exclude: ^(docs/|.*test.*\.py$|utilities/manifests/.*|utilities/plugins/tgis_grpc/.*)


  - repo: local
    hooks:
      - id: check-signoff
        name: Check Signed-off-by
        stages: [commit-msg]
        language: system
        entry: >
          bash -c 'grep -q "^Signed-off-by: .* <.*@.*>" "$1" ||
          { echo "ERROR: Commit message must include a valid Signed-off-by trailer.";
          echo "  Use: git commit -s";
          echo "  Or add manually: Signed-off-by: Your Name <your@email.com>"; exit 1; }' --

  - repo: https://github.com/espressif/conventional-precommit-linter
    rev: v1.11.0
    hooks:
      - id: conventional-precommit-linter
        stages: [ commit-msg ]
        args:
          - --types=build,ci,chore,docs,feat,fix,perf,refactor,revert,style,test
          - --subject-min-length=10
          - --subject-max-length=80

  - repo: local
    hooks:
        - id: check-prohibited-patterns
          name: Check for prohibited code patterns
          entry: python scripts/check_incorrect_wrapper_usage.py
          language: python
          pass_filenames: false

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.12
    hooks:
      - id: actionlint

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.22.0
    hooks:
      - id: markdownlint-cli2
        args:
          - --fix
